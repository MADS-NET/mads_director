name: Tag Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  compile:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            os: macos-latest
            configure: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          - name: Linux x86_64
            os: ubuntu-latest
            configure: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_WAYLAND=OFF -DGLFW_BUILD_X11=ON
          - name: Linux arm64
            os: ubuntu-24.04-arm
            configure: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_WAYLAND=OFF -DGLFW_BUILD_X11=ON
          - name: Windows AMD64
            os: windows-latest
            configure: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libgl1-mesa-dev

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Build (non-Windows)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cpack --config build/CPackConfig.cmake -C Release

      - name: Package (non-Windows)
        if: runner.os != 'Windows'
        run: cpack --config build/CPackConfig.cmake

      - name: Collect package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Get-ChildItem -Path build -File | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' } | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination release-assets
          }
          if (-not (Get-ChildItem -Path release-assets -File -ErrorAction SilentlyContinue)) {
            Write-Error "No package artifacts found in build directory."
            exit 1
          }

      - name: Collect package artifacts (non-Windows)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-assets
          find build -maxdepth 1 -type f \( -name '*.deb' -o -name '*.sh' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No package artifacts found in build directory."
            exit 1
          fi

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Create release
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
