[director]
sample_rate = 2.0

[broker]
command = "mads broker"
relaunch = true
tty=true

[feedback]
command = "mads feedback"
after = "broker"
tty = true

[perf_assess]
command = "mads perf_assess -p 100"
after = "broker"
tty=true
relaunch = true
scale = 2

[rerunner]
after = "broker"
command = "mads sink build/rerunner.plugin"
workdir = "/Users/p4010/Develop/MADS_plugins/rerunner_plugin"
