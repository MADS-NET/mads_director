[director]
sample_rate = 0.5

[broker]
command = "mads-broker"
relaunch = true
tty=true

[feedback]
command = "mads-feedback"
after = "broker"
tty = true

[perf_assess]
command = "mads-perf_assess -p10 -id=${ID}"
after = "broker"
tty=true
relaunch = true
scale = 2

[rerunner]
after = "broker"
command = "mads-sink build/rerunner.plugin"
workdir = "/Users/p4010/Develop/MADS_plugins/rerunner_plugin"
enabled = false

[fmu]
after = "broker"
command = "build/src/main/mads-fmu models/fmu/DoubleMassSpringDamper.fmu -p1"
workdir = "C:/Users/Utente/Devel/FMU_agent"
enabled = false

[mongo]
command = "docker run --name mads-mongo-test --rm -v ${PWD}/db:/data/db -p27017:27017 -it mongo"
tty = true
enabled = false
